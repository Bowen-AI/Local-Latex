name: CI
on:
  push:
    branches: [main, develop, 'feat/**', 'release/**']
  pull_request:
    branches: [main, develop]
jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run compile
      - name: Package VSIX
        run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.os }}
          path: '*.vsix'
